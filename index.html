<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roadie Admin Training Simulator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="training-banner">TRAINING SIMULATION — FICTIONAL DATA — NO PRODUCTION ACTIONS</div>
  <header class="topbar">
    <button class="brand" data-route="home" aria-label="Home">R</button>
    <nav class="main-nav" aria-label="Primary">
      <button data-route="search">Profiles</button>
      <button data-route="search">Gigs</button>
      <button disabled>Master Accounts</button>
      <button disabled>Expenses</button>
      <button disabled>Credits</button>
      <button disabled>Quotes</button>
      <button disabled>Claims</button>
      <button disabled>Issues</button>
      <button disabled>Bulk Certification Tool</button>
    </nav>
    <div class="header-search">
      <input id="headerSearch" placeholder="Search" />
      <button id="headerSearchBtn">⌕</button>
    </div>
  </header>

  <main id="app"></main>

  <template id="home-template">
    <section class="page home-page">
      <h1>Welcome back, Training Associate</h1>
      <div class="hero-search">
        <select id="homeFilter">
          <option>Filter By</option>
          <option>Profiles</option>
          <option>Gigs</option>
        </select>
        <input id="homeSearch" placeholder="Search by ID, email, name or phone number" />
        <button id="homeSearchBtn" class="primary">Search</button>
      </div>
      <div class="dashboard-grid">
        <section>
          <h2>Recently Viewed</h2>
          <div class="card profile-card" data-profile-id="TRN-PRO-1001">
            <div class="avatar small">R</div>
            <div><strong>Northstar Gig Support</strong><br><span>northstar@example.test</span><br><small>Active &amp; Joined in 2025</small></div>
          </div>
        </section>
        <section>
          <h2>Active Issues</h2>
          <div class="empty-state">No active issues in this scenario.</div>
        </section>
        <section>
          <h2>Recent Notes</h2>
          <div class="card"><strong>Profile Note</strong><br><span>avery.primary@example.test</span></div>
          <div class="card"><strong>Profile Note</strong><br><span>avery.duplicate@example.test</span></div>
        </section>
      </div>
      <footer>© Training Simulation 2026</footer>
    </section>
  </template>

  <template id="search-template">
    <section class="page search-page">
      <div class="page-heading-row"><h1>Search</h1><div class="avatar">TA</div></div>
      <div class="hero-search compact">
        <select id="searchFilter"><option>Filter By</option><option>Profiles</option><option>Gigs</option></select>
        <input id="searchInput" placeholder="Search by ID, email, name or phone number" />
        <button id="searchBtn" class="primary">Search</button>
      </div>
      <section class="table-section">
        <h2>Profiles</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Profile Type</th><th>Name</th><th>Email</th><th>Phone</th><th>Status</th><th>Created At</th><th>Updated At</th></tr></thead>
            <tbody id="profilesBody"></tbody>
          </table>
        </div>
      </section>
      <section class="table-section">
        <h2>Gigs</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Title</th><th>Sender</th><th>State</th><th>Deadline</th><th>Offers</th><th>Event</th><th>Support ID</th></tr></thead>
            <tbody id="gigsBody"></tbody>
          </table>
        </div>
      </section>
    </section>
  </template>

  <template id="profile-template">
    <section class="page detail-page">
      <div class="status-line"><span class="pill active" id="profileStatusPill">✓ Active</span><small id="profileCreated"></small></div>
      <div class="profile-title"><div><span class="briefcase">▣</span> <h1 id="profileName"></h1> <span id="profileEmail"></span></div><div class="avatar">R</div></div>
      <div class="issue-alert">⚑ This profile has an open training issue <span>fictional scenario</span></div>
      <div class="detail-layout">
        <aside class="sidebar">
          <button class="selected">Profile</button><button>Gigs (2000+)</button><button>Consolidations</button><button>Accounts (3)</button><button>Transactions (0)</button><button>Credits</button><button>Certifications</button><button>Notifications (0)</button><button>Related Profiles (2)</button><button>Images</button><button>Ratings</button><hr><button id="markPrimaryBtn">Mark as Primary</button><button id="unlockBtn">Unlock Account</button><button id="clearLicenseBtn">Clear License</button><button id="addNoteBtn">Add Note</button>
        </aside>
        <section class="detail-content">
          <div class="detail-grid" id="profileDetails"></div>
          <section class="notes-section"><h2>Training Notes</h2><ul id="notesList"></ul></section>
        </section>
        <aside class="scenario-panel">
          <div class="scenario-header"><span>Practice Mode</span><button id="resetScenarioBtn">Reset</button></div>
          <h2>Resolve Duplicate Driver Accounts</h2>
          <p>A driver cannot access their account and appears to have multiple profiles.</p>
          <h3>Objective</h3>
          <p>Identify the correct primary account, restore access, clear the duplicate license, and document the resolution.</p>
          <h3>Progress</h3>
          <ul id="progressList"></ul>
          <button id="hintBtn" class="secondary">Show Hint</button>
          <p id="hintText" class="hint"></p>
          <div id="completeMessage" class="complete-message" hidden>Scenario complete. Great work.</div>
        </aside>
      </div>
    </section>
  </template>

  <template id="gig-template">
    <section class="page detail-page">
      <div class="status-line"><span class="pill delivered">DELIVERED</span><small>Support ID: TRN-SUP-1N139DFL</small></div>
      <div class="profile-title"><div><h1>Roadie Gig Fix — support id TRN-SUP-1N139DFL</h1></div><div class="completion-box">COMPLETE<br><strong>1 of 1 Deliveries</strong></div></div>
      <div class="detail-layout gig-layout">
        <aside class="sidebar"><button class="selected">Details</button><button>Images (3)</button><button>Offers (4)</button><button>Events (8)</button><button>Tracking Points (24)</button><button>Notifications (4)</button><button>Payments (2)</button><button>Reviews (1)</button><button>Documents</button><button>Conversations</button><button>Linked Gigs</button></aside>
        <section class="detail-content">
          <div class="detail-grid" id="gigDetails"></div>
          <section class="notes-section"><h2>Driver Notes</h2><div class="detail-grid"><span>Pickup Notes</span><strong>Location: Front Door</strong><span>Delivery Notes</span><strong>Leave at front desk</strong></div></section>
          <section class="notes-section"><h2>Sender Price Summary</h2><div class="detail-grid"><span>Invoice Distance</span><strong>0.0000 miles</strong><span>Base Rate</span><strong>$11.10</strong><span>Sender Total Cost</span><strong>$11.30</strong></div></section>
        </section>
      </div>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
